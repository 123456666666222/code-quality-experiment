server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_checkin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 应用配置
app:
  # 签到码有效期（分钟）
  checkin-code-expire: 5
  # 签到码长度
  checkin-code-length: 6
